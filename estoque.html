<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
     body{
      font-size: 20px;
      font-family: sans-serif;
      font-weight: bold;
      
      margin: 20px;
      background-color: #f4f4f9;
     }
     h2 {
      color: #333;
      font-weight: bold;
     }
     table {
      border-collapse: collapse;
      margin-bottom: 20px;
     }
     table, th, td {
      border: 1px solid #ccc;
     }
     th, td {
      padding: 8px;
      text-align: left;
     }
     th {
      background-color: #eee;
     }
     fieldset {
     max-width: 600px;
     background-color: #fff;
     padding: 20px;
     border: 1px solid #ccc;
     border-radius: 5px;
     }
     fieldset table {
      width: 100%;
      border: none;
     }
     fieldset table td {
      border: none;
      padding: 8px;
     }
     input[type="text"], input[type="number"], input[type="date"] {
      width: 100%;
      padding: 8px;
      margin: 4px 0;

      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
     }
     input[type="submit"], input[type="reset"] {
      color: white;
      padding: 10px 20px;

      width: 30%;
      transition-property: width;
      transition-duration: 0.5s;

      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      margin: 5px;
     }
     input[type="submit"] {
      background-color: #4CAF50;
     }
      input[type="reset"] {
      background-color: #df0026;
     }
     input[type="submit"]:hover {
      background-color: #45a049;
        width: 40%;
     }
    input[type="reset"]:hover {
      background-color: #c7001b;
      width: 40%;
     }
  </style>
  <title>Estoque</title>
</head>
<body>
    <h2>Tabela de estoque de produto</h2>
    <span><a href="./index.html">voltar</a></span>

    <table>
      <thead>
        <th>Código de produto</th>
        <th>Descrição de produtos</th>
        <th>Preços (R$)</th>
        <th>Quantidade</th>
      </thead>

      <tbody>

        <tr>
          <td>PROD0001</td>
          <td>Camisa basica preta</td>
          <td>R$ 50,00</td>
          <td>25</td>
        </tr>

        <tr>
          <td>PROD0002</td>
          <td>Tenis Nike</td>
          <td>R$ 200,00</td>
          <td>10</td>
        </tr>

        <tr>
          <td>PROD0003</td>
          <td>Tenis Adidas</td>
          <td>R$ 180,00</td>
          <td>15</td>
        </tr>

        <tr>
          <td>PROD0004</td>
          <td>Calça jeans</td>
          <td>R$ 120,00</td>
          <td>20</td>
        </tr>
      </tbody>
    </table>

      <form action="/cadastrar_estoque" method='post'>
        <fieldset>
            <legend>
                 Cadastro de Produtos
             </legend>

             <table>
                <tr>
                  <td>
                    <label for="codigo_produto">Código do produto</label>
                  </td>
                  <td>
                    <input type='number' id='codigo_produto'
                     name='codigoProduto' placeholder='digite o código do produto'
                      step='1' required>
                  </td>
                </tr>

                <tr>
                  <td>
                    <label for="descricao_produto">Descrição do produto</label>
                  </td>
                  <td>
                    <input type='text' id='descricao_produto' name='descricaoProduto' placeholder='digite a descrição do produto' required>
                  </td>
                </tr>

                <tr>
                  <td>
                    <label for="quantidade_produto">Quantidade</label>
                  </td>
                  <td>
                    <input type='number' id='quantidade_produto' name='quantidadeProduto' placeholder='Quantidade' step='1' required>
                  </td>
                </tr>

                <tr>
                  <td>
                    <label for="typeProduct">Tipo de produto</label>
                  </td>
                  <td>
                    <input type='text' id='typeProduct' name='nomeProduto' placeholder='digite um texto' focused required>
                  </td>
                </tr>

          <select title="product" id='produtos' name="produtos">
                 <option value='camisa'>Camisa</option>
                 <option value='shorts'>Shorts</option>
                 <option value='chinelo nike' selected>Chinelo nike</option>
                 <option value='boné'>Boné just do it</option>

                 <input type='date' name='data_atualização'>

                 <input type="reset" value="Limpar">
                 <input type="submit" value="Cadastrar">
               </select>
             </table>
          </select>
    </fieldset>
  </form>
</body>
<script>
  let a = 10;
  let b = 20;

  let adicao = a + b;
  console.log(adicao);

  let subtracao = a - b;
  console.log(subtracao);

  let multiplicacao = a * b;
  console.log(multiplicacao)

  let divisao = a / b;
  console.log(divisao)

  console.log(divisao + "" + adicao);

  let modulo = a % b;
  console.log(modulo)

  let exponencial = a ** b;
  console.log(exponencial);

  let increment = a;
  increment++;
  console.log(increment);

  let decrement = b;
  decrement--;
  console.log(decrement);

  /**
  *Operadores de Atribuição
  */
  let x = 5;
  let y = 10;

  x += 5;

  x *= y;

  x /= y;

  /**
  *Operadores Aritiméticos
  */

  function frutasDesejadas(fruta1, fruta2){
    const frutaDesejada = 'maçã';

    return fruta1 === frutaDesejada && fruta2 === frutaDesejada2;
  }

  console.log(frutasDesejadas('maçã', 'banana'));
  console.log(frutasDesejadas('uva', 'pera'));
  console.log(frutasDesejadas('uva', 'banana'));

  function frutasDesejadas2(fruta1, fruta2){
    const frutaDesejada = 'jaboticaba';
    const frutaDesejada2 = 'mamão';

    return fruta1 === frutaDesejada || fruta2 === frutaDesejada2;
  }

  console.log(frutasDesejadas2('maçã', 'mamão'));

  <!-- Operadores de Strings -->
  let string1 = 'Olá';
  let string2 = 'Mundo';

  function concatenarStrings(str1, str2){
    return str1.concat(' ', str2);
  }

  let stringNova = concatenarStrings(string1, string2);
  console.log(stringNova);
  console.log(stringNova.toUpperCase());
  console.log(stringNova.toLowerCase());
  console.log(stringNova.substring(0, 5));
  console.log(stringNova.substring(1, 5));
  console.log(stringNova.replace('Olá', 'Hello'));
  console.log(stringNova.replace('Mundo', 'World'));

  a = 20;
  b = 10;

  expressao = (a % b) + (a**b);
  console.log(expressao);

  saudacao = 'olá';
  saudacao += ' mundo';
  saudacao = saudacao.toUpperCase();
  console.log(saudacao);

  let fruta1 = "maçã";

let fruta2 = "banana";

let resultado = (fruta1 === "maçã" && fruta2 === "pera") || (fruta1 === "maçã" && fruta2 === "banana");
console.log(resultado);

a += b > 8 && b <= 10 ? 3 : 2;
console.log(a);

x *= y > 15 ? 2 : 3;
console.log(x);
b -= a < 50 ? 5 : 10;
console.log(b);
</script>
</html>
